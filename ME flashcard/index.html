<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form>
      <h2>Formulario de Contacto</h2>
      <fieldset>
        <legend>Basic Information</legend>
        <div class="form_input">
          <!--Name-->
          <label for="name">Full name</label>
          <input type="text" placeholder="John Perez" id="name" required />
        </div>
        <div class="form_input">
          <!--Email-->
          <label for="email">Email</label>
          <input
            type="email"
            placeholder="example@gmail.com"
            id="email"
            required
          />
        </div>
        <div class="form_input">
          <!--Age - Years-->
          <label
            >Age - Years
            <input type="number" placeholder="33" required />
          </label>
        </div>
      </fieldset>
      <div class="form_input">
        <!--Type of users-->
        <label
          >Type of users
          <select name="type-of-users">
            <option value="user1">Follower</option>
            <option value="user2">Enterprise</option>
            <option value="user3">Others</option>
          </select>
        </label>
      </div>
      <div class="form_input">
        <!--Referred by-->
        <label
          >Referred by
          <input list="reference" />
          <datalist id="reference" name="names">
            <option value="CEO">Mark Phoenix</option>
            <option value="Manager">Peter Draxler</option>
            <option value="Enterprise">Microsoft</option>
          </datalist>
        </label>
      </div>
      <div class="form_input">
        <!--Message-->
        <label for="message">Message</label>
        <textarea
          placeholder="Leave us a Message..."
          id="message"
          rows="8"
        ></textarea>
      </div>
      <div class="form_input">
        <!--Terms and condition-->
        <label for="terms">I aggre the terms and conditions</label>
        <input type="checkbox" class="checkbox" id="terms" />
      </div>
    </form>
  </body>
</html>
